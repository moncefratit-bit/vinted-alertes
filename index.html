<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinted Alertes</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#fff;--bg2:#f5f5f3;--bg3:#eeede9;--text:#1a1a18;--text2:#6b6b67;--text3:#a0a09c;
    --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);--radius:10px;--radius-lg:14px;
    --green:#0F6E56;--green-bg:#E1F5EE;--green-bd:#9FE1CB;
    --blue-bg:#E6F1FB;--blue:#185FA5;--blue-bd:#B5D4F4;
    --amber-bg:#FAEEDA;--amber:#854F0B;--amber-bd:#FAC775;
    --red-bg:#FEE9E5;--red:#D85A30;--red-bd:#F9C4B9;
    --teal:#5DCAA5;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  }
  @media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#252522;--bg3:#2e2e2b;--text:#f0efeb;--text2:#9a9a95;--text3:#666662;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2)}}
  html,body{min-height:100%;background:var(--bg3);font-family:var(--font);color:var(--text)}
  .wrap{max-width:640px;margin:0 auto;padding:1.5rem 1rem 4rem}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
  .header h1{font-size:20px;font-weight:500}
  .header p{font-size:13px;color:var(--text2);margin-top:2px}
  .top-right{display:flex;align-items:center;gap:8px}
  .dot{width:7px;height:7px;border-radius:50%}
  .dot.on{background:var(--teal)}.dot.off{background:var(--text3)}
  .btn-primary{background:var(--green);color:#fff;border:none;border-radius:var(--radius);padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:opacity .15s}
  .btn-primary:hover{opacity:.85}
  .btn-ghost{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:7px 12px;font-size:13px;cursor:pointer;color:var(--text2);font-family:var(--font)}
  .btn-ghost:hover{background:var(--bg3)}
  .btn-icon{background:transparent;border:0.5px solid var(--border);border-radius:6px;padding:5px 9px;font-size:13px;cursor:pointer;color:var(--text2);font-family:var(--font)}
  .btn-icon:hover{background:var(--bg2)}
  .card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
  .card h2{font-size:15px;font-weight:500;margin-bottom:.85rem}
  .fields{display:flex;flex-direction:column;gap:8px}
  .row2{display:flex;gap:8px}.row2>*{flex:1}
  .field-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
  input[type=text],input[type=number],select,textarea{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:9px 11px;font-size:14px;color:var(--text);outline:none;width:100%;font-family:var(--font);transition:border-color .15s}
  input::placeholder,textarea::placeholder{color:var(--text3)}
  input:focus,select:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(93,202,165,.12)}
  textarea{resize:none;line-height:1.5}
  .url-hint{font-size:12px;color:var(--text3);margin-top:4px;line-height:1.6}
  .url-hint a{color:var(--green);text-decoration:none}
  .mode-toggle{display:flex;background:var(--bg2);border-radius:8px;padding:3px;margin-bottom:10px}
  .mode-btn{flex:1;border:none;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s;background:transparent;color:var(--text2)}
  .mode-btn.active{background:var(--bg);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .form-actions{display:flex;gap:8px;margin-top:4px}
  .form-actions .btn-primary{flex:1;padding:10px;font-size:14px}
  .section-sep{border:none;border-top:0.5px solid var(--border);margin:10px 0}
  .section-title{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
  .tabs{display:flex;background:var(--bg2);border-radius:var(--radius);padding:3px;margin-bottom:1rem}
  .tab{flex:1;border:none;border-radius:7px;padding:7px 10px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s;background:transparent;color:var(--text2)}
  .tab.active{background:var(--bg);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .alert-card{background:var(--bg);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px;border:0.5px solid var(--border)}
  .alert-card.on{border-color:var(--teal)}.alert-card.off{opacity:.62}
  .alert-top{display:flex;align-items:center;justify-content:space-between}
  .alert-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
  .alert-actions{display:flex;gap:6px;flex-shrink:0}
  .alert-tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
  .tag{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;border:0.5px solid;white-space:nowrap}
  .tag-gray  {background:var(--bg2);      color:var(--text2); border-color:var(--border)}
  .tag-blue  {background:var(--blue-bg);  color:var(--blue);  border-color:var(--blue-bd)}
  .tag-amber {background:var(--amber-bg); color:var(--amber); border-color:var(--amber-bd)}
  .tag-red   {background:var(--red-bg);   color:var(--red);   border-color:var(--red-bd)}
  .tag-green {background:var(--green-bg); color:var(--green); border-color:var(--green-bd);cursor:pointer}
  .btn-toggle{font-size:12px;padding:5px 11px;border-radius:6px;border:0.5px solid;cursor:pointer;font-family:var(--font);font-weight:500}
  .btn-toggle.on {background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
  .btn-toggle.off{background:var(--bg2);color:var(--text2);border-color:var(--border)}

  /* Log items */
  .log-item{display:flex;gap:12px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;align-items:center;margin-bottom:8px;text-decoration:none;color:inherit;transition:border-color .15s;position:relative}
  .log-item:hover{border-color:var(--border2)}
  .log-thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg2)}
  .log-body{flex:1;min-width:0}
  .log-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .log-meta{display:flex;gap:8px;margin-top:5px;align-items:center;flex-wrap:wrap}
  .log-price{font-size:15px;font-weight:600;color:var(--green)}
  .log-stars{font-size:12px;color:var(--amber)}
  .log-info{font-size:11px;color:var(--text3)}
  .log-condition{font-size:11px;color:var(--text2);background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;padding:1px 7px}

  /* Filters bar */
  .filters-bar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
  .empty{text-align:center;padding:3.5rem 1rem;color:var(--text3);font-size:14px;line-height:1.7}
  .btn-buy{display:inline-flex;align-items:center;gap:5px;background:var(--green);color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;white-space:nowrap;flex-shrink:0;transition:opacity .15s}
  .btn-buy:hover{opacity:.85}
  .footer-hint{font-size:11px;color:var(--text3);text-align:center;padding-top:12px}
  .status-ok{color:var(--green);font-size:13px}
  .status-err{color:var(--red);font-size:13px}
  code{background:var(--bg2);padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:12px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
let S = {
  alerts:    [],
  logs:      [],
  tab:       'alerts',
  form: { mode:'url', name:'', url:'', kw:'', max:'', min:'', condition:'', stars:'4', excludeKw:'' },
  open:      false,
  editId:    null,   // id de l'alerte en cours d'édition (null = création)
  tg:        { token:'', chatId:'' },
  tgStatus:  '',
  loading:   true,
};

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

async function loadAll() {
  const [alerts, logs] = await Promise.all([api('GET','/api/alerts'), api('GET','/api/logs')]);
  S.alerts = alerts; S.logs = logs; S.loading = false; render();
}

setInterval(async () => {
  if (['logs','alerts'].includes(S.tab)) {
    const [alerts, logs] = await Promise.all([api('GET','/api/alerts'), api('GET','/api/logs')]);
    S.alerts = alerts; S.logs = logs; render();
  }
}, 5000);

function set(p) { Object.assign(S, p); render(); }

window.addAlert = async () => {
  const f = S.form;
  let body;
  if (f.mode==='url') {
    if (!f.url.trim()) return;
    body = { name: f.name.trim()||f.url.trim(), sourceUrl: f.url.trim(), kw:'', stars: f.stars, excludeKw: f.excludeKw.trim() };
  } else {
    if (!f.kw.trim()) return;
    body = { name: f.name.trim()||f.kw.trim(), kw: f.kw.trim(), max: f.max, min: f.min, condition: f.condition, stars: f.stars, excludeKw: f.excludeKw.trim() };
  }
  const a = await api('POST', '/api/alerts', body);
  S.alerts = [...S.alerts, a];
  S.form = { mode: f.mode, name:'', url:'', kw:'', max:'', min:'', condition:'', stars:'4', excludeKw:'' };
  set({ open: false });
};

window.toggleAlert = async id => {
  const a = S.alerts.find(x=>x.id===id);
  if (!a) return;
  const u = await api('PUT', `/api/alerts/${id}`, { active: !a.active, badge: 0 });
  S.alerts = S.alerts.map(x => x.id===id ? u : x); render();
};

window.delAlert = async id => {
  if (!confirm('Supprimer cette alerte ?')) return;
  await api('DELETE', `/api/alerts/${id}`);
  S.alerts = S.alerts.filter(a => a.id!==id); render();
};

window.editAlert = id => {
  const a = S.alerts.find(x => x.id === id);
  if (!a) return;
  // Pré-remplir le formulaire avec les valeurs de l'alerte
  S.form = {
    mode:      a.sourceUrl ? 'url' : 'manual',
    name:      a.name      || '',
    url:       a.sourceUrl || '',
    kw:        a.kw        || '',
    max:       a.max       || '',
    min:       a.min       || '',
    condition: a.condition || '',
    stars:     a.stars     || '4',
    excludeKw: a.excludeKw || '',
  };
  set({ open: true, editId: id });
  // Scroll vers le formulaire
  setTimeout(() => document.querySelector('.card')?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
};

window.saveAlert = async () => {
  const f  = S.form;
  const id = S.editId;
  let body;
  if (f.mode === 'url') {
    if (!f.url.trim()) return;
    body = { name: f.name.trim()||f.url.trim(), sourceUrl: f.url.trim(), kw:'', stars: f.stars, excludeKw: f.excludeKw.trim() };
  } else {
    if (!f.kw.trim()) return;
    body = { name: f.name.trim()||f.kw.trim(), sourceUrl:'', kw: f.kw.trim(), max: f.max, min: f.min, condition: f.condition, stars: f.stars, excludeKw: f.excludeKw.trim() };
  }
  const updated = await api('PUT', `/api/alerts/${id}`, body);
  S.alerts = S.alerts.map(x => x.id === id ? updated : x);
  S.form = { mode: f.mode, name:'', url:'', kw:'', max:'', min:'', condition:'', stars:'4', excludeKw:'' };
  set({ open: false, editId: null });
};

window.clrBadge = async id => {
  const u = await api('PUT', `/api/alerts/${id}`, { badge: 0 });
  S.alerts = S.alerts.map(x => x.id===id ? u : x);
  set({ tab: 'logs' });
};

window.clearLogs = async () => {
  if (!confirm('Vider l\'historique ?')) return;
  await api('DELETE', '/api/logs');
  S.logs = []; render();
};

window.switchTab   = t => set({ tab: t });
window.toggleForm  = () => { if (S.open) { set({ open: false, editId: null }); } else { S.form = { mode:'url', name:'', url:'', kw:'', max:'', min:'', condition:'', stars:'4', excludeKw:'' }; set({ open: true, editId: null }); } };
window.setMode     = m => { S.form.mode = m; render(); };
window.fv          = (f,v) => { S.form[f] = v; };

window.testTelegram = async () => {
  const token  = document.getElementById('tg-token')?.value.trim()  || '';
  const chatId = document.getElementById('tg-chatid')?.value.trim() || '';
  if (!token || !chatId) { set({ tgStatus: 'missing' }); return; }
  set({ tgStatus: 'sending' });
  const d = await api('POST', '/api/test-telegram', { token, chatId });
  set({ tgStatus: d.ok ? 'ok' : 'err_'+(d.description||d.reason||'erreur') });
};

window.saveTgSettings = async () => {
  const token  = document.getElementById('tg-token')?.value.trim()  || '';
  const chatId = document.getElementById('tg-chatid')?.value.trim() || '';
  await api('POST', '/api/settings', { token, chatId });
  set({ tgStatus: 'saved' });
  setTimeout(() => set({ tgStatus: '' }), 2000);
};

// ── Render ─────────────────────────────────────────────────────────────────────
function esc(s){ return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(ts){ return new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(ts){
  const d=new Date(ts),now=new Date();
  if(d.toDateString()===now.toDateString()) return 'aujourd\'hui';
  if(d.toDateString()===new Date(now-86400000).toDateString()) return 'hier';
  return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}
const CONDITIONS = {6:'Neuf étiquette',1:'Neuf sans étiquette',2:'Très bon état',3:'Bon état',4:'Satisfaisant'};

function render(){
  const el = document.getElementById('app');
  if (!el) return;
  if (S.loading) { el.innerHTML='<div class="empty">Chargement…</div>'; return; }

  const activeCount = S.alerts.filter(a=>a.active).length;
  const totalBadge  = S.alerts.reduce((s,a)=>s+(a.badge||0),0);
  const f = S.form;



  let html = `
  <div class="header">
    <div><h1>Vinted Alertes</h1><p>${activeCount} alerte${activeCount!==1?'s':''} active${activeCount!==1?'s':''} · cloud · 5s</p></div>
    <div class="top-right">
      <span class="dot ${activeCount>0?'on':'off'}"></span>
      <button class="btn-primary" onclick="toggleForm()">+ Alerte</button>
    </div>
  </div>`;

  // ── Formulaire ──
  if (S.open) {
    html += `<div class="card"><h2>${S.editId ? "✏️ Modifier l'alerte" : "Nouvelle alerte"}</h2>
      <div class="mode-toggle">
        <button class="mode-btn ${f.mode==='url'?'active':''}" onclick="setMode('url')">🔗 URL Vinted</button>
        <button class="mode-btn ${f.mode==='manual'?'active':''}" onclick="setMode('manual')">⚙️ Saisie manuelle</button>
      </div>
      <div class="fields">
        <input type="text" placeholder="Nom de l'alerte (ex: Xbox Series S bon plan)" value="${esc(f.name)}" oninput="fv('name',this.value)" />`;

    if (f.mode==='url') {
      html += `
        <textarea rows="2" placeholder="Colle ici ton URL de recherche Vinted&#10;ex: https://www.vinted.fr/catalog?search_text=xbox+series+s&amp;price_to=100" oninput="fv('url',this.value)">${esc(f.url)}</textarea>
        <div class="url-hint">Fais ta recherche sur Vinted → applique tes filtres → copie l'URL. <a href="https://www.vinted.fr/catalog" target="_blank">Ouvrir Vinted →</a></div>
        <div class="row2">
          <select onchange="fv('stars',this.value)">
            ${[['0','Toutes notes'],['3','★ 3+'],['4','★ 4+'],['4.5','★ 4.5+'],['5','★ 5']].map(([v,l])=>`<option value="${v}"${f.stars===v?' selected':''}>${l}</option>`).join('')}
          </select><div></div>
        </div>`;
    } else {
      html += `
        <input type="text" placeholder="Mots-clés (ex: xbox series s)" value="${esc(f.kw)}" oninput="fv('kw',this.value)" onkeydown="if(event.key==='Enter')addAlert()" />
        <div class="row2">
          <input type="number" placeholder="Prix min (€)" value="${esc(f.min)}" oninput="fv('min',this.value)" min="0"/>
          <input type="number" placeholder="Prix max (€)" value="${esc(f.max)}" oninput="fv('max',this.value)" min="0"/>
        </div>
        <div class="row2">
          <select onchange="fv('condition',this.value)">
            <option value="">Tout état</option>
            <option value="6" ${f.condition==='6'?'selected':''}>Neuf avec étiquette</option>
            <option value="1" ${f.condition==='1'?'selected':''}>Neuf sans étiquette</option>
            <option value="2" ${f.condition==='2'?'selected':''}>Très bon état</option>
            <option value="3" ${f.condition==='3'?'selected':''}>Bon état</option>
            <option value="4" ${f.condition==='4'?'selected':''}>Satisfaisant</option>
          </select>
          <select onchange="fv('stars',this.value)">
            ${[['0','Toutes notes'],['3','★ 3+'],['4','★ 4+'],['4.5','★ 4.5+'],['5','★ 5']].map(([v,l])=>`<option value="${v}"${f.stars===v?' selected':''}>${l}</option>`).join('')}
          </select>
        </div>`;
    }

    html += `
        <hr class="section-sep">
        <div class="section-title">Filtres avancés</div>
        <div>
          <div class="field-label">Mots à exclure</div>
          <input type="text" placeholder="ex: pokemon, carte, jeux (séparés par des virgules)" value="${esc(f.excludeKw)}" oninput="fv('excludeKw',this.value)" />
          <div class="url-hint">Les annonces dont le titre contient ces mots ne seront pas remontées.</div>
        </div>

        <div class="form-actions">
          <button class="btn-primary" onclick="S.editId ? saveAlert() : addAlert()">${S.editId ? "Sauvegarder" : "Créer l'alerte"}</button>
          <button class="btn-ghost" onclick="toggleForm()">Annuler</button>
        </div>
      </div>
    </div>`;
  }

  // ── Tabs ──
  html += `<div class="tabs">
    <button class="tab ${S.tab==='alerts'?'active':''}" onclick="switchTab('alerts')">Alertes (${S.alerts.length})</button>
    <button class="tab ${S.tab==='logs'?'active':''}" onclick="switchTab('logs')">Annonces${S.logs.length>0?' ('+S.logs.length+')':''}${totalBadge>0?` <span style="background:var(--green);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;margin-left:3px">${totalBadge}</span>`:''}</button>
    <button class="tab ${S.tab==='settings'?'active':''}" onclick="switchTab('settings')">⚙️</button>
  </div>`;

  // ── Alertes ──
  if (S.tab==='alerts') {
    if (S.alerts.length===0) {
      html += `<div class="empty">Aucune alerte.<br>Clique sur <strong>+ Alerte</strong> pour commencer.<br><br>
        <span style="font-size:13px">Exemple : <em>"Xbox Series S"</em>, prix max 100€, exclure "accessoire, manette"</span>
      </div>`;
    } else {
      S.alerts.forEach(a => {
        const excl = a.excludeKw ? a.excludeKw.split(',').map(s=>s.trim()).filter(Boolean) : [];
        html += `<div class="alert-card ${a.active?'on':'off'}">
          <div class="alert-top">
            <div style="display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden">
              <span class="alert-name">${esc(a.name)}</span>
              ${a.badge>0?`<span class="tag tag-green" onclick="clrBadge('${a.id}')">+${a.badge} new</span>`:''}
            </div>
            <div class="alert-actions">
              <button class="btn-icon" onclick="editAlert('${a.id}')" title="Modifier">✏️</button>
              <button class="btn-toggle ${a.active?'on':'off'}" onclick="toggleAlert('${a.id}')">${a.active?'Active':'Pause'}</button>
              <button class="btn-icon" onclick="delAlert('${a.id}')" style="color:var(--text3)">✕</button>
            </div>
          </div>
          <div class="alert-tags">
            ${a.sourceUrl?`<span class="tag tag-blue" title="${esc(a.sourceUrl)}">🔗 URL</span>`:`<span class="tag tag-gray">${esc(a.kw)}</span>`}
            ${a.max?`<span class="tag tag-blue">≤${a.max}€</span>`:''}
            ${a.min?`<span class="tag tag-blue">≥${a.min}€</span>`:''}
            ${parseFloat(a.stars||0)>0?`<span class="tag tag-amber">★ ${a.stars}+</span>`:''}
            ${excl.map(kw=>`<span class="tag tag-red">✕ ${esc(kw)}</span>`).join('')}
          </div>
        </div>`;
      });
    }
  }

  // ── Logs ──
  if (S.tab==='logs') {
    html += `<div style="display:flex;justify-content:flex-end;margin-bottom:8px">
      <button class="btn-ghost" onclick="clearLogs()" style="font-size:12px;padding:4px 10px">Vider</button>
    </div>`;

    if (S.logs.length===0) {
      html += `<div class="empty">Aucune annonce${S.logFilter!=='all'?' dans cette catégorie':' pour l\'instant'}.<br>Le serveur vérifie toutes les 15s.</div>`;
    } else {
      S.logs.forEach(l => {
        const href  = l.url?(l.url.startsWith('http')?l.url:'https://www.vinted.fr'+l.url):'#';
        const stars = l.stars!=null?(l.stars<=1?l.stars*5:l.stars).toFixed(1):null;
        const cond  = CONDITIONS[l.condition] || '';
        const buyUrl = href; // lien direct vers l'annonce — bouton Acheter en haut de page
        html += `<div class="log-item">
          <a href="${esc(href)}" target="_blank" rel="noopener" style="display:flex;gap:12px;align-items:center;flex:1;min-width:0;text-decoration:none;color:inherit">
            ${l.img?`<img class="log-thumb" src="${esc(l.img)}" loading="lazy"/>`:`<div class="log-thumb"></div>`}
            <div class="log-body">
              <div class="log-title">${esc(l.title)}</div>
              <div class="log-meta">
                <span class="log-price">${l.price!=='?'?l.price+'€':'—'}</span>
                ${stars?`<span class="log-stars">★ ${stars}</span>`:''}
                ${cond?`<span class="log-condition">${cond}</span>`:''}
                <span class="log-info">${esc(l.aname)} · ${fmtDate(l.ts)} ${fmtTime(l.ts)}</span>
              </div>
            </div>
          </a>
          <a class="btn-buy" href="${esc(buyUrl)}" target="_blank" rel="noopener">🛒 Acheter</a>
        </div>`;
      });
    }
  }

  // ── Paramètres ──
  if (S.tab==='settings') {
    const statusMsg = {
      ok:      '<span class="status-ok">✅ Telegram connecté !</span>',
      saved:   '<span class="status-ok">✅ Sauvegardé</span>',
      sending: '<span style="color:var(--text3);font-size:13px">Envoi…</span>',
      missing: '<span class="status-err">⚠ Remplis le token et le Chat ID</span>',
    }[S.tgStatus] || (S.tgStatus.startsWith('err_')?`<span class="status-err">⚠ ${esc(S.tgStatus.slice(4))}</span>`:'');

    html += `<div class="card">
      <h2>🔔 Notifications Telegram</h2>
      <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:1rem">
        <strong style="color:var(--text)">1.</strong> Telegram → <strong style="color:var(--text)">@BotFather</strong> → <code>/newbot</code> → copie le <strong style="color:var(--text)">token</strong><br>
        <strong style="color:var(--text)">2.</strong> Envoie un message à ton bot → <code>api.telegram.org/bot&lt;TOKEN&gt;/getUpdates</code> → note le <strong style="color:var(--text)">chat id</strong>
      </div>
      <div class="fields">
        <input type="text" id="tg-token"  placeholder="Token du bot (7123456789:AAFxxx…)" />
        <input type="text" id="tg-chatid" placeholder="Chat ID (123456789)" />
        <div class="row2">
          <button class="btn-primary" onclick="testTelegram()">📨 Tester</button>
          <button class="btn-ghost"   onclick="saveTgSettings()">Sauvegarder</button>
        </div>
        ${statusMsg?`<div style="text-align:center;padding:4px 0">${statusMsg}</div>`:''}
      </div>
    </div>
`;
  }

  html += `<div class="footer-hint">Serveur cloud · polling toutes les 15s · PC peut être éteint</div>`;
  el.innerHTML = html;
}

loadAll();
</script>
</body>
</html>
